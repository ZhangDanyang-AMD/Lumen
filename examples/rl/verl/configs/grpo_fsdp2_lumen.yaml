defaults:
  - model_engine: fsdp
  - actor@actor_rollout_ref.actor: ${model_engine}_actor
  - data@data: legacy_data
  - ref@actor_rollout_ref.ref: ${model_engine}_ref
  - rollout@actor_rollout_ref.rollout: rollout
  - model@actor_rollout_ref.model: hf_model
  - critic@critic: ${model_engine}_critic
  - legacy_reward_impl
  - reward@reward: reward
  - algorithm@algorithm.rollout_correction: rollout_correction
  - _self_

actor_rollout_ref:
  hybrid_engine: true
  nccl_timeout: 600

  model:
    path: ${oc.env:MODEL_NAME,meta-llama/Llama-3.1-8B}
    override_config:
      model_config: {}
    trust_remote_code: false
    use_remove_padding: false
    use_fused_kernels: false

  actor:
    strategy: fsdp2
    ppo_mini_batch_size: 64
    ppo_micro_batch_size_per_gpu: 4
    grad_clip: 1.0
    clip_ratio: 0.2
    entropy_coeff: 0.0
    ppo_epochs: 1
    shuffle: true
    use_kl_loss: false
    kl_loss_coef: 0.0
    optim:
      lr: 5e-7
      lr_warmup_steps: 0
      weight_decay: 0.0
    fsdp_config:
      wrap_policy:
        min_num_params: 0
      param_offload: false
      optimizer_offload: false
      offload_policy: false
      reshard_after_forward: true
      fsdp_size: -1
      model_dtype: bf16
      dtype: bfloat16
      strategy: fsdp2

  ref:
    fsdp_config:
      param_offload: true

  rollout:
    name: hf
    temperature: 1.0
    top_p: 1.0
    prompt_length: 512
    response_length: 256
    n: 4
    val_kwargs:
      temperature: 0.0
      top_p: 1.0
      do_sample: false

algorithm:
  gamma: 1.0
  lam: 1.0
  adv_estimator: grpo
  norm_adv_by_std_in_grpo: true
  use_kl_in_reward: false
  kl_penalty: kl
  kl_ctrl:
    type: fixed
    kl_coef: 0.0
    horizon: 10000
    target_kl: 0.1

data:
  train_files: ${oc.env:TRAIN_DATA,trl-lib/DeepMath-103K}
  val_files: null
  train_batch_size: 128
  max_prompt_length: 512
  max_response_length: 256

critic:
  strategy: fsdp2
  optim:
    lr: 1e-5

reward:
  reward_manager: prime

trainer:
  total_epochs: 1
  total_training_steps: 10
  project_name: lumen-verl-grpo
  experiment_name: llama-8b-grpo-fsdp2
  logger:
    - console
  save_freq: -1
  test_freq: -1

ray_kwargs:
  ray_init:
    num_cpus: 16
